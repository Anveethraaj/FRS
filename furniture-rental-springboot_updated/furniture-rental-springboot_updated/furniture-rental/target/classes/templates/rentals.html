<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Rentals | FurnRent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root{--bg:#0f0f13;--surface:#18181f;--card:#1e1e28;--border:#2a2a38;--accent:#c8a96e;--accent2:#e8c896;--text:#e8e8f0;--muted:#8888a0;--success:#4caf82;--danger:#e05c5c;--warning:#e09c3c;--info:#5c9ce0;--sidebar-w:260px}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
        .sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
        .sidebar-brand{padding:28px 24px 24px;border-bottom:1px solid var(--border)}
        .sidebar-brand h1{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--accent)}
        .sidebar-brand p{font-size:.72rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
        .sidebar-logo{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),#96703e);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:1.2rem}
        .sidebar-nav{flex:1;padding:20px 12px;overflow-y:auto}
        .nav-label{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:0 12px;margin:16px 0 8px}
        .nav-link{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:8px;color:var(--muted);text-decoration:none;font-size:.88rem;font-weight:500;transition:all .2s;margin-bottom:2px}
        .nav-link i{width:18px;text-align:center}
        .nav-link:hover{background:var(--card);color:var(--text)}
        .nav-link.active{background:linear-gradient(135deg,rgba(200,169,110,.18),rgba(200,169,110,.06));color:var(--accent);border:1px solid rgba(200,169,110,.2)}
        .sidebar-footer{padding:16px;border-top:1px solid var(--border);font-size:.75rem;color:var(--muted);text-align:center}
        .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column}
        .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
        .topbar-title h2{font-family:'Playfair Display',serif;font-size:1.3rem}
        .topbar-title p{font-size:.78rem;color:var(--muted);margin-top:2px}
        .topbar-actions{display:flex;gap:10px}
        .page-content{padding:28px 32px;flex:1}
        .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
        .table-wrap{overflow-x:auto}
        table{width:100%;border-collapse:collapse;font-size:.875rem}
        thead th{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:10px 16px;border-bottom:1px solid var(--border);text-align:left;font-weight:600}
        tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
        tbody tr:hover{background:rgba(255,255,255,.03)}
        tbody td{padding:13px 16px;vertical-align:middle}
        .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:600}
        .badge-success{background:rgba(76,175,130,.15);color:var(--success)}
        .badge-danger{background:rgba(224,92,92,.15);color:var(--danger)}
        .badge-warning{background:rgba(224,156,60,.15);color:var(--warning)}
        .badge-info{background:rgba(92,156,224,.15);color:var(--info)}
        .badge-muted{background:rgba(136,136,160,.15);color:var(--muted)}
        .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;border:none;text-decoration:none;transition:all .2s}
        .btn-primary{background:var(--accent);color:#0f0f13}
        .btn-primary:hover{background:var(--accent2)}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
        .btn-outline:hover{border-color:var(--accent);color:var(--accent)}
        .btn-sm{padding:6px 12px;font-size:.8rem}
        .form-group{margin-bottom:16px}
        .form-label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
        .form-control{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.875rem;transition:border-color .2s;outline:none}
        .form-control:focus{border-color:var(--accent)}
        .form-control option{background:var(--card)}
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
        .modal-overlay.open{display:flex}
        .modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:modal-in .2s ease}
        @keyframes modal-in{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
        .modal-title{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:20px}
        .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
        .empty-state i{font-size:2.5rem;margin-bottom:12px;opacity:.4;display:block}
        .toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 20px;font-size:.875rem;z-index:999;display:none}
        .filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        .filter-btn{padding:7px 14px;border-radius:20px;font-size:.8rem;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;text-decoration:none}
        .filter-btn:hover,.filter-btn.active{background:var(--accent);color:#0f0f13;border-color:var(--accent)}
    </style>
</head>
<body>
<nav class="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-logo">&#x1FA91;</div>
        <h1>FurnRent</h1>
        <p>Management System</p>
    </div>
    <div class="sidebar-nav">
        <div class="nav-label">Main</div>
        <a th:href="@{/}" class="nav-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a th:href="@{/furniture}" class="nav-link"><i class="fas fa-couch"></i> Inventory</a>
        <a th:href="@{/rentals}" class="nav-link active"><i class="fas fa-file-contract"></i> Rentals</a>
        <div class="nav-label">Tools</div>
        <a href="/h2-console" target="_blank" class="nav-link"><i class="fas fa-database"></i> H2 Console</a>
        <a href="/api/v1/furniture" target="_blank" class="nav-link"><i class="fas fa-plug"></i> REST API</a>
    </div>
    <div class="sidebar-footer">Furniture Rental &copy; 2026</div>
</nav>
<div class="main">
    <div class="topbar">
        <div class="topbar-title">
            <h2>Rentals</h2>
            <p>Manage rental orders and returns</p>
        </div>
        <div class="topbar-actions">
            <button class="btn btn-primary" onclick="openModal('newRentalModal')"><i class="fas fa-plus"></i> New Rental</button>
        </div>
    </div>
    <div class="page-content">
        <div class="filter-bar">
            <a th:href="@{/rentals}" class="filter-btn" th:classappend="${selectedStatus == null} ? ' active' : ''">All</a>
            <a th:each="s : ${statuses}" th:href="@{/rentals(status=${s})}"
               class="filter-btn" th:classappend="${selectedStatus == s} ? ' active' : ''"
               th:text="${s}"></a>
        </div>
        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr><th>Order #</th><th>Customer</th><th>Item</th><th>Period</th><th>Days</th><th>Cost</th><th>Deposit</th><th>Status</th><th></th></tr>
                    </thead>
                    <tbody>
                    <tr th:if="${rentals.empty}">
                        <td colspan="9"><div class="empty-state"><i class="fas fa-file-contract"></i><p>No rentals found.</p></div></td>
                    </tr>
                    <tr th:each="r : ${rentals}">
                        <td style="font-weight:600;color:var(--accent);font-size:.82rem;" th:text="${r.orderNumber}"></td>
                        <td>
                            <div style="font-weight:500;" th:text="${r.customerName}"></div>
                            <div style="font-size:.75rem;color:var(--muted);" th:text="${r.customerEmail}"></div>
                        </td>
                        <td>
                            <div th:text="${r.furnitureName}"></div>
                            <div style="font-size:.75rem;color:var(--muted);" th:text="${r.furnitureCode}"></div>
                        </td>
                        <td style="font-size:.8rem;color:var(--muted);">
                            <div th:text="${r.startDate}"></div>
                            <div>to <span th:text="${r.endDate}"></span></div>
                        </td>
                        <td style="text-align:center;font-weight:600;" th:text="${r.rentalDays}"></td>
                        <td style="font-weight:700;color:var(--accent);">$<span th:text="${#numbers.formatDecimal(r.totalCost,1,2)}"></span></td>
                        <td style="color:var(--muted);">$<span th:text="${#numbers.formatDecimal(r.deposit,1,2)}"></span></td>
                        <td>
                                <span class="badge"
                                      th:classappend="${r.status.name()=='ACTIVE'} ? 'badge-success' : (${r.status.name()=='RETURNED'} ? 'badge-muted' : (${r.status.name()=='OVERDUE'} ? 'badge-danger' : 'badge-info'))"
                                      th:text="${r.status}"></span>
                        </td>
                        <td><a th:href="@{/rentals/{o}(o=${r.orderNumber})}" class="btn btn-outline btn-sm"><i class="fas fa-eye"></i></a></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- New Rental Modal -->
<div class="modal-overlay" id="newRentalModal">
    <div class="modal">
        <div class="modal-title">Create New Rental</div>
        <div class="grid-2">
            <div class="form-group">
                <label class="form-label">Customer Name *</label>
                <input class="form-control" id="r-customerName" placeholder="Full name"/>
            </div>
            <div class="form-group">
                <label class="form-label">Customer Email *</label>
                <input class="form-control" id="r-customerEmail" type="email" placeholder="email@example.com"/>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Customer ID *</label>
            <input class="form-control" id="r-customerId" type="number" placeholder="e.g. 1001"/>
        </div>
        <div class="form-group">
            <label class="form-label">Furniture *</label>
            <select class="form-control" id="r-furnitureId" onchange="previewCost()">
                <option value="">Select available furniture</option>
                <option th:each="f : ${furniture}" th:value="${f.id}"
                        th:text="${f.name} + ' (' + ${f.code} + ') - $' + ${f.dailyRate} + '/day'"></option>
            </select>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label class="form-label">Start Date *</label>
                <input class="form-control" id="r-startDate" type="date" onchange="previewCost()"/>
            </div>
            <div class="form-group">
                <label class="form-label">End Date *</label>
                <input class="form-control" id="r-endDate" type="date" onchange="previewCost()"/>
            </div>
        </div>
        <div id="cost-preview" style="display:none;background:var(--bg);border-radius:8px;padding:14px;font-size:.85rem;margin-bottom:8px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
                <span style="color:var(--muted)">Estimated Cost:</span>
                <span id="preview-cost" style="font-weight:700;color:var(--accent)"></span>
            </div>
            <div style="display:flex;justify-content:space-between;">
                <span style="color:var(--muted)">Deposit (20%):</span>
                <span id="preview-deposit" style="font-weight:600;"></span>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('newRentalModal')">Cancel</button>
            <button class="btn btn-primary" onclick="createRental()"><i class="fas fa-check"></i> Create Rental</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script>
    function showToast(msg,type){
        const t=document.getElementById('toast');
        t.textContent=msg;
        t.style.borderColor=type==='success'?'var(--success)':type==='error'?'var(--danger)':'var(--warning)';
        t.style.display='block';
        setTimeout(()=>t.style.display='none',3000);
    }
    function openModal(id){document.getElementById(id).classList.add('open');}
    function closeModal(id){document.getElementById(id).classList.remove('open');}
    document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
    document.addEventListener('DOMContentLoaded',()=>{
        const today=new Date().toISOString().split('T')[0];
        document.getElementById('r-startDate').min=today;
        document.getElementById('r-endDate').min=today;
    });
    function previewCost(){
        const fSel=document.getElementById('r-furnitureId');
        const start=document.getElementById('r-startDate').value;
        const end=document.getElementById('r-endDate').value;
        if(!fSel.value||!start||!end)return;
        const opt=fSel.selectedOptions[0]?.text||'';
        const match=opt.match(/\$([0-9.]+)\/day/);
        if(!match)return;
        const rate=parseFloat(match[1]);
        const days=Math.max(1,Math.round((new Date(end)-new Date(start))/(86400000)));
        const cost=rate*days;
        document.getElementById('preview-cost').textContent='$'+cost.toFixed(2);
        document.getElementById('preview-deposit').textContent='$'+(cost*0.2).toFixed(2);
        document.getElementById('cost-preview').style.display='block';
    }
    async function createRental(){
        const payload={
            furnitureId:parseInt(document.getElementById('r-furnitureId').value),
            customerId:parseInt(document.getElementById('r-customerId').value),
            customerName:document.getElementById('r-customerName').value,
            customerEmail:document.getElementById('r-customerEmail').value,
            startDate:document.getElementById('r-startDate').value,
            endDate:document.getElementById('r-endDate').value
        };
        if(!payload.furnitureId||!payload.customerId||!payload.customerName||!payload.startDate||!payload.endDate){
            showToast('Please fill all required fields','error');return;
        }

        const res=await fetch('/api/v1/rentals',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});

        if(res.ok){
            showToast('Rental created!','success');
            setTimeout(()=>location.reload(),900);
            return;
        }

        // Parse error
        let e = {};
        try { e = await res.json(); } catch (_) {}

        // Handle conflict with nextAvailableDate
        if(res.status === 409 && e.nextAvailableDate){
            const msg = (e.message ? e.message + ' ' : '') + `Next available: ${e.nextAvailableDate}.`;
            showToast(msg, 'error');

            // guide date pickers
            const startInput = document.getElementById('r-startDate');
            const endInput   = document.getElementById('r-endDate');
            if (startInput) startInput.min = e.nextAvailableDate;

            // Optionally auto-adjust values:
            // if (startInput && (!startInput.value || startInput.value < e.nextAvailableDate)) startInput.value = e.nextAvailableDate;
            // if (endInput && endInput.value && endInput.value < startInput.value) endInput.value = startInput.value;

            return;
        }

        // Other errors
        showToast(e.message||'Error','error');
    }
</script>
</body>
</html>
``
