# ==========================================
# Application
# ==========================================
spring.application.name=furniture-rental
server.port=8080

# ==========================================
# H2 Database (Persistent mode)
# ==========================================
spring.datasource.url=jdbc:h2:file:./data/furnituredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==========================================
# Hibernate / JPA Settings
# ==========================================
# IMPORTANT: "update" keeps your existing data
spring.jpa.hibernate.ddl-auto=update

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# H2 Console
# ==========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# Data Initialization
# ==========================================
# Prevent data.sql/schema.sql from erasing/reloading data on every restart
spring.sql.init.mode=never