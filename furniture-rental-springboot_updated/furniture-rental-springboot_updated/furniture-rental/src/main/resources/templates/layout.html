<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${title}">Furniture Rental</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root {
            --bg:       #0f0f13;
            --surface:  #18181f;
            --card:     #1e1e28;
            --border:   #2a2a38;
            --accent:   #c8a96e;
            --accent2:  #e8c896;
            --text:     #e8e8f0;
            --muted:    #8888a0;
            --success:  #4caf82;
            --danger:   #e05c5c;
            --warning:  #e09c3c;
            --info:     #5c9ce0;
            --sidebar-w: 260px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 15px; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .sidebar-brand {
            padding: 28px 24px 24px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-brand h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            color: var(--accent);
            line-height: 1.2;
        }
        .sidebar-brand p {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .sidebar-logo {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--accent), #96703e);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
            font-size: 1.2rem;
        }
        .sidebar-nav {
            flex: 1;
            padding: 20px 12px;
            overflow-y: auto;
        }
        .nav-label {
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 12px;
            margin: 16px 0 8px;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            border-radius: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            transition: all 0.2s;
            margin-bottom: 2px;
        }
        .nav-link i { width: 18px; text-align: center; font-size: 0.9rem; }
        .nav-link:hover { background: var(--card); color: var(--text); }
        .nav-link.active {
            background: linear-gradient(135deg, rgba(200,169,110,0.18), rgba(200,169,110,0.06));
            color: var(--accent);
            border: 1px solid rgba(200,169,110,0.2);
        }
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--muted);
            text-align: center;
        }

        /* ── Main ── */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar-title h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--text);
        }
        .topbar-title p { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
        .topbar-actions { display: flex; gap: 10px; align-items: center; }
        .page-content { padding: 28px 32px; flex: 1; }

        /* ── Cards ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }
        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            color: var(--text);
        }

        /* ── Stat Cards ── */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 22px;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 80px; height: 80px;
            border-radius: 50%;
            background: var(--accent-color, var(--accent));
            opacity: 0.06;
            transform: translate(20px, -20px);
        }
        .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            margin: 8px 0 4px;
            line-height: 1;
        }
        .stat-sub { font-size: 0.78rem; color: var(--muted); }
        .stat-icon {
            position: absolute;
            right: 20px; top: 20px;
            width: 38px; height: 38px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
        }

        /* ── Tables ── */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        thead th {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            font-weight: 600;
        }
        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s;
        }
        tbody tr:hover { background: rgba(255,255,255,0.03); }
        tbody td { padding: 13px 16px; color: var(--text); vertical-align: middle; }

        /* ── Badges ── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        .badge-success { background: rgba(76,175,130,0.15); color: var(--success); }
        .badge-danger { background: rgba(224,92,92,0.15); color: var(--danger); }
        .badge-warning { background: rgba(224,156,60,0.15); color: var(--warning); }
        .badge-info { background: rgba(92,156,224,0.15); color: var(--info); }
        .badge-muted { background: rgba(136,136,160,0.15); color: var(--muted); }
        .badge-accent { background: rgba(200,169,110,0.15); color: var(--accent); }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center; gap: 7px;
            padding: 9px 18px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: #0f0f13;
        }
        .btn-primary:hover { background: var(--accent2); }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-danger { background: rgba(224,92,92,0.15); color: var(--danger); border: 1px solid rgba(224,92,92,0.3); }
        .btn-danger:hover { background: rgba(224,92,92,0.25); }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .btn-success { background: rgba(76,175,130,0.15); color: var(--success); border: 1px solid rgba(76,175,130,0.3); }
        .btn-success:hover { background: rgba(76,175,130,0.25); }

        /* ── Forms ── */
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 6px;
        }
        .form-control {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-control:focus { border-color: var(--accent); }
        .form-control option { background: var(--card); }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            width: 520px;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto;
            animation: modal-in 0.2s ease;
        }
        @keyframes modal-in {
            from { transform: translateY(-16px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--text);
        }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

        /* ── Grid ── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

        /* ── Misc ── */
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 8px; }
        .gap-3 { gap: 12px; }
        .mt-1 { margin-top: 6px; }
        .mb-4 { margin-bottom: 20px; }
        .text-muted { color: var(--muted); font-size: 0.85rem; }
        .text-accent { color: var(--accent); }
        .divider { height: 1px; background: var(--border); margin: 20px 0; }
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--muted);
        }
        .empty-state i { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
        .empty-state p { font-size: 0.9rem; }

        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 20px;
            font-size: 0.875rem;
            z-index: 999;
            animation: slideUp 0.3s ease;
            display: none;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }

        .furniture-img {
            width: 42px; height: 42px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--border), var(--surface));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-logo">🪑</div>
            <h1>FurnRent</h1>
            <p>Management System</p>
        </div>
        <div class="sidebar-nav">
            <div class="nav-label">Main</div>
            <a th:href="@{/}" class="nav-link" th:classappend="${page == 'dashboard'} ? 'active'">
                <i class="fas fa-chart-pie"></i> Dashboard
            </a>
            <a th:href="@{/furniture}" class="nav-link" th:classappend="${page == 'furniture'} ? 'active'">
                <i class="fas fa-couch"></i> Inventory
            </a>
            <a th:href="@{/rentals}" class="nav-link" th:classappend="${page == 'rentals'} ? 'active'">
                <i class="fas fa-file-contract"></i> Rentals
            </a>
            <div class="nav-label">Tools</div>
            <a href="/h2-console" target="_blank" class="nav-link">
                <i class="fas fa-database"></i> H2 Console
            </a>
            <a href="/api/v1/furniture" target="_blank" class="nav-link">
                <i class="fas fa-plug"></i> REST API
            </a>
        </div>
        <div class="sidebar-footer">Furniture Rental © 2024</div>
    </nav>

    <div class="main">
        <div th:replace="${content}"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.borderColor = type === 'success' ? 'var(--success)' : type === 'error' ? 'var(--danger)' : 'var(--warning)';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
        function openModal(id) { document.getElementById(id).classList.add('open'); }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    </script>
</body>
</html>
