<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="sidebar(page)" class="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-logo">🪑</div>
        <h1>FurnRent</h1>
        <p>Management System</p>
    </div>
    <div class="sidebar-nav">
        <div class="nav-label">Main</div>
        <a th:href="@{/}" class="nav-link" th:classappend="${page == 'dashboard'} ? ' active' : ''">
            <i class="fas fa-chart-pie"></i> Dashboard
        </a>
        <a th:href="@{/furniture}" class="nav-link" th:classappend="${page == 'furniture'} ? ' active' : ''">
            <i class="fas fa-couch"></i> Inventory
        </a>
        <a th:href="@{/rentals}" class="nav-link" th:classappend="${page == 'rentals'} ? ' active' : ''">
            <i class="fas fa-file-contract"></i> Rentals
        </a>
        <div class="nav-label">Tools</div>
        <a href="/h2-console" target="_blank" class="nav-link">
            <i class="fas fa-database"></i> H2 Console
        </a>
        <a href="/api/v1/furniture" target="_blank" class="nav-link">
            <i class="fas fa-plug"></i> REST API
        </a>
    </div>
    <div class="sidebar-footer">Furniture Rental © 2024</div>
</nav>
</body>
</html>
